name: Release

on:
  push:
    branches:
      - main
    paths:
      - Resources/Info.plist
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Validate signing and notarization secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_CODESIGN_IDENTITY \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -p codesigning -v "$keychain_path"

      - name: Build packaged app and DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: ./scripts/build_app.sh

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/notarize_dmg.sh

      - name: Read version metadata
        id: version
        run: |
          marketing_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)
          build_number=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Resources/Info.plist)
          echo "marketing_version=$marketing_version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$marketing_version" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"
          previous_tag="$(git tag --list 'v*' --sort=-version:refname | grep -Fxv "$TAG_NAME" | head -n1 || true)"

          if [[ -n "$previous_tag" ]]; then
            commit_subjects="$(git log "${previous_tag}..HEAD" --format='%s')"
          else
            commit_subjects="$(git log --format='%s')"
          fi

          filtered_subjects="$(
            printf '%s\n' "$commit_subjects" \
              | awk 'NF' \
              | grep -Ev '^(Bump|Update) (release )?version|^Version [0-9]+\.[0-9]+\.[0-9]+' \
              || true
          )"

          if [[ -z "$filtered_subjects" ]]; then
            filtered_subjects="$(printf '%s\n' "$commit_subjects" | awk 'NF')"
          fi

          {
            echo "## Changes"
            echo
            if [[ -n "$filtered_subjects" ]]; then
              printf '%s\n' "$filtered_subjects" | sed 's/^/- /'
            else
              echo "- Initial automated release from the current committed source."
            fi

            if [[ -n "$previous_tag" ]]; then
              echo
              echo "_Changes since $previous_tag._"
            fi
          } > "$notes_file"

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: photos-library-sort-helper-macos-universal-dmg
          path: dist/PhotosLibrarySortHelper-macos-universal.dmg
          retention-days: 30
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          MARKETING_VERSION: ${{ steps.version.outputs.marketing_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "Photos Library Sort Helper $MARKETING_VERSION" \
              --notes-file "$NOTES_FILE"
            gh release upload "$TAG_NAME" dist/PhotosLibrarySortHelper-macos-universal.dmg --clobber
          else
            gh release create "$TAG_NAME" dist/PhotosLibrarySortHelper-macos-universal.dmg \
              --title "Photos Library Sort Helper $MARKETING_VERSION" \
              --notes-file "$NOTES_FILE"
          fi
