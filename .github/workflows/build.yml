name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build packaged app and DMG
        run: ./scripts/build_app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: photos-library-sort-helper-macos-universal-dmg
          path: dist/PhotosLibrarySortHelper-macos-universal.dmg
          retention-days: 30
          if-no-files-found: error
