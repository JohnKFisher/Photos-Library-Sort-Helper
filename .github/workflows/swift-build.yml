name: Swift Build

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build
